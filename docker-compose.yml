services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vigia
      POSTGRES_USER: vigia
      POSTGRES_PASSWORD: vigia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigia -d vigia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
